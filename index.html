<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Planner</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#e9d6c8;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
}

.container{
    width:900px;
    padding:30px;
}

h1{
    color:#7b4f3d;
    font-size:48px;
    margin-bottom:10px;
}

.day{
    font-size:18px;
    margin-bottom:20px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.section{
    background:#f4ebe4;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.section h2{
    color:#7b4f3d;
    margin-top:0;
}

.todo-item{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.todo-item input[type="checkbox"]{
    margin-right:10px;
    transform:scale(1.2);
}

.todo-item span.done{
    text-decoration:line-through;
    color:gray;
}

input[type="text"]{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    background:#7b4f3d;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    border:none;
    padding:10px;
    resize:none;
}

.gratitude-item{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Daily Planner</h1>

<div class="day">
    Day: <span id="today"></span>
</div>

<div class="layout">

<!-- TODO SECTION -->
<div class="section">

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Add a task...">
<button onclick="addTask()">Add Task</button>

<div id="todoList"></div>

</div>


<!-- GRATITUDE SECTION -->
<div class="section">

<h2>Gratitude</h2>

<div class="gratitude-item">
<input id="g1" placeholder="I'm grateful for...">
</div>

<div class="gratitude-item">
<input id="g2" placeholder="I'm grateful for...">
</div>

<div class="gratitude-item">
<input id="g3" placeholder="I'm grateful for...">
</div>

<button onclick="saveGratitude()">Save</button>

</div>

</div>


<!-- NOTES -->
<div class="section" style="margin-top:30px">

<h2>Notes</h2>

<textarea id="notes" placeholder="Write your notes..."></textarea>
<button onclick="saveNotes()">Save Notes</button>

</div>

</div>


<script>

const today = new Date().toDateString();
document.getElementById("today").innerText = today;

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks(){

const list = document.getElementById("todoList");
list.innerHTML="";

tasks.forEach((task,index)=>{

const div=document.createElement("div");
div.className="todo-item";

const checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=task.done;

checkbox.onchange=()=>{
tasks[index].done=checkbox.checked;
saveTasks();
};

const span=document.createElement("span");
span.textContent=task.text;

if(task.done){
span.classList.add("done");
}

div.appendChild(checkbox);
div.appendChild(span);

list.appendChild(div);

});

}

function addTask(){

const input=document.getElementById("taskInput");
const text=input.value.trim();

if(text==="") return;

tasks.push({text:text,done:false});
input.value="";

saveTasks();

}

function saveTasks(){

localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();

}

function saveNotes(){

const notes=document.getElementById("notes").value;
localStorage.setItem("notes",notes);

}

function saveGratitude(){

const g1=document.getElementById("g1").value;
const g2=document.getElementById("g2").value;
const g3=document.getElementById("g3").value;

localStorage.setItem("gratitude",JSON.stringify([g1,g2,g3]));

}

function loadSaved(){

const notes=localStorage.getItem("notes");
if(notes){
document.getElementById("notes").value=notes;
}

const gratitude=JSON.parse(localStorage.getItem("gratitude"));
if(gratitude){
document.getElementById("g1").value=gratitude[0];
document.getElementById("g2").value=gratitude[1];
document.getElementById("g3").value=gratitude[2];
}

}

loadSaved();
renderTasks();

</script>

</body>
</html>
